name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure zip is available
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Build plugin package
        run: npm run build

      - name: Extract release notes from changelog
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          
          if [ -f CHANGELOG.md ] && grep -q "^## ${CURRENT_TAG} (" CHANGELOG.md; then
            # Extract the section for this release from CHANGELOG.md
            awk "/^## ${CURRENT_TAG} \(/,/^## [0-9]/ {if (/^## [0-9]/ && !/^## ${CURRENT_TAG} \(/) exit; print}" CHANGELOG.md > release-notes.md
            echo "Using changelog entry from CHANGELOG.md"
          else
            # Fallback: generate from commits
            PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"
            RELEASE_DATE="$(date -u +%Y-%m-%d)"

            if [ -n "$PREVIOUS_TAG" ]; then
              RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
              TITLE="Changes since ${PREVIOUS_TAG}"
            else
              RANGE="${CURRENT_TAG}"
              TITLE="Initial release"
            fi

            COMMITS="$(git log --no-merges --pretty=format:'- %s (%h)' ${RANGE} || echo '- No changes')"

            cat > release-notes.md <<EOF
          ## ${CURRENT_TAG} (${RELEASE_DATE})

          ${TITLE}

          ${COMMITS}
          EOF
            echo "Generated release notes from commits (no CHANGELOG.md entry found)"
          fi

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: release-notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}