name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure zip is available
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Build plugin package
        run: npm run build

      - name: Extract release notes from changelog
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"

          if [ ! -f CHANGELOG.md ]; then
            echo "ERROR: CHANGELOG.md is missing. Release notes must be authored in CHANGELOG.md before tagging ${CURRENT_TAG}." >&2
            exit 1
          fi

          if ! grep -q "^## ${CURRENT_TAG} (" CHANGELOG.md; then
            echo "ERROR: No changelog entry found for ${CURRENT_TAG}. Add a section like '## ${CURRENT_TAG} (YYYY-MM-DD)' to CHANGELOG.md before releasing." >&2
            exit 1
          fi

          # Extract only the section for CURRENT_TAG until the next section header.
          awk -v tag="$CURRENT_TAG" '
            BEGIN { in_section = 0 }
            $0 ~ "^## " tag " \\(" { in_section = 1; print; next }
            in_section && $0 ~ /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "ERROR: Failed to extract release notes for ${CURRENT_TAG} from CHANGELOG.md." >&2
            exit 1
          fi

          echo "Using changelog entry from CHANGELOG.md"

      - name: Create GitHub Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: release-notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}